name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Build EXE
        run: >
          python -m PyInstaller
          --noconfirm
          --windowed
          --name SongListApp
          --icon assets/SongListApp.ico
          --add-data "data/nocopyright_list.csv;data"
          app.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SongListApp-windows
          path: dist/SongListApp/
